[package]
name = "snake-rs"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = "0.13"
burn = { version = "0.16", features = ["wgpu", "train", "autodiff"] }
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rayon = "1.8"
chrono = "0.4"
uuid = { version = "1.8", features = ["v4"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
