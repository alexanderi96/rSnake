<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake AI - Bussola Relativa</title>
    <style>
        :root {
            --bg-color: #0f172a; --panel-bg: #1e293b; --text-color: #e2e8f0;
            --cell-bg: #334155; --wall-color: #000000; --head-color: #22c55e;
            --body-color: #166534; --food-color: #3b82f6; --ray-color: rgba(239, 68, 68, 0.15);
        }

        body { margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
        .main-container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .panel { background-color: var(--panel-bg); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; }

        .grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; background-color: var(--wall-color); padding: 4px; border-radius: 8px; border: 4px solid #475569; margin-bottom: 20px; }
        .cell { width: 32px; height: 32px; background-color: var(--cell-bg); border-radius: 4px; position: relative; cursor: pointer; transition: background 0.2s; }
        .cell:hover:not(.head):not(.body) { background-color: #475569; }

        .cell.head { background-color: var(--head-color); box-shadow: 0 0 10px rgba(34, 197, 94, 0.6); z-index: 3; cursor: default; }
        
        /* Naso del serpente per indicare la direzione in cui guarda */
        .cell.head::after { content: ''; position: absolute; width: 6px; height: 6px; background-color: #fff; border-radius: 50%; transform: translate(-50%, -50%); }
        .cell.head.face-UP::after { top: 20%; left: 50%; }
        .cell.head.face-DOWN::after { top: 80%; left: 50%; }
        .cell.head.face-RIGHT::after { top: 50%; left: 80%; }
        .cell.head.face-LEFT::after { top: 50%; left: 20%; }

        .cell.body { background-color: var(--body-color); z-index: 2; cursor: default; }
        .cell.food { background-color: var(--food-color); box-shadow: 0 0 12px var(--food-color); z-index: 2; }
        .cell.ray { background-color: var(--ray-color); }

        button { padding: 12px 24px; background-color: var(--head-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: background-color 0.2s;}
        button:hover { background-color: #16a34a; }

        .sensors-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .sensor-card { background: #000; padding: 20px; border-radius: 12px; width: 260px; display: flex; flex-direction: column; align-items: center; }
        .compass-container { width: 180px; height: 180px; position: relative; margin-bottom: 20px; }
        svg { width: 100%; height: 100%; overflow: visible; }
        .wedge { transition: opacity 0.2s ease-out, fill 0.2s ease-out; }
        
        .stats-list { width: 100%; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; font-weight: bold; }
        .stat-bar-container { width: 50%; background: #333; border-radius: 4px; overflow: hidden; height: 14px; margin-top: 2px; }
        .stat-bar { height: 100%; width: 0%; transition: width 0.2s ease-out; }
        
        .distance-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid #334155; width: 100%; text-align: center; font-size: 14px; font-weight: bold; color: #3b82f6; }
        h2 { margin: 0 0 15px 0; font-size: 1.3rem; text-align: center; color: #fff; }
        h3 { margin: 0 0 15px 0; font-size: 1.1rem; text-align: center; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="panel">
            <h2>Mondo Assoluto</h2>
            <div id="grid" class="grid"></div>
            <div style="font-size: 12px; color: #94a3b8; margin-bottom: 15px; text-align: center;">Clicca sulla griglia per posizionare il cibo</div>
            <button onclick="generateScene()">Rigenera Serpente Casuale</button>
        </div>

        <div class="panel">
            <h2>Sensori (Nord = Avanti)</h2>
            <div class="sensors-container">
                <div class="sensor-card">
                    <h3>Radar Cibo</h3>
                    <div class="compass-container"><svg viewBox="-70 -70 140 140" id="compass-food"></svg></div>
                    <div class="stats-list" id="stats-food"></div>
                    <div class="distance-box" id="distance-food">Distanza: -- passi</div>
                </div>

                <div class="sensor-card">
                    <h3>Raycast Ostacoli</h3>
                    <div class="compass-container"><svg viewBox="-70 -70 140 140" id="compass-danger"></svg></div>
                    <div class="stats-list" id="stats-danger"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gridSize = 11;
        const center = Math.floor(gridSize / 2);
        
        let snake = [];
        let foodPos = null;
        
        // Vettori di orientamento assoluti sulla griglia HTML (Y va verso il basso)
        const absoluteDirs = [
            { id: 'UP',    dx: 0,  dy: -1 }, // Guarda verso l'alto dello schermo
            { id: 'RIGHT', dx: 1,  dy: 0  }, // Guarda verso destra
            { id: 'DOWN',  dx: 0,  dy: 1  }, // Guarda verso il basso
            { id: 'LEFT',  dx: -1, dy: 0  }  // Guarda verso sinistra
        ];

        let f_vec = absoluteDirs[0]; // Vettore "Avanti" (Local North)
        let r_vec = { dx: 1, dy: 0 }; // Vettore "Destra" (Local East)

        // Etichette relative al serpente. N = Sempre la direzione in cui guarda.
        const localDirs = [
            { name: 'E',  lx: 1,  ly: 0  }, // Destra
            { name: 'NE', lx: 1,  ly: 1  }, // Avanti-Destra
            { name: 'N',  lx: 0,  ly: 1  }, // Avanti
            { name: 'NW', lx: -1, ly: 1  }, // Avanti-Sinistra
            { name: 'W',  lx: -1, ly: 0  }, // Sinistra
            { name: 'SW', lx: -1, ly: -1 }, // Indietro-Sinistra
            { name: 'S',  lx: 0,  ly: -1 }, // Indietro
            { name: 'SE', lx: 1,  ly: -1 }  // Indietro-Destra
        ];

        const gridEl = document.getElementById('grid');
        const wedgesFood = []; const wedgesDanger = [];
        const svgRotations = [0, 315, 270, 225, 180, 135, 90, 45]; 

        function initCompass(element, arrayStr, baseColor) {
            const svgNS = "http://www.w3.org/2000/svg";
            localDirs.forEach((dir, i) => {
                const r = 50; const a1 = -22.5 * Math.PI / 180; const a2 = 22.5 * Math.PI / 180;
                const path = document.createElementNS(svgNS, "path");
                path.setAttribute("d", `M 0 0 L ${r*Math.cos(a1)} ${r*Math.sin(a1)} A ${r} ${r} 0 0 1 ${r*Math.cos(a2)} ${r*Math.sin(a2)} Z`);
                path.setAttribute("transform", `rotate(${svgRotations[i]})`);
                path.setAttribute("fill", baseColor);
                path.setAttribute("stroke", "#1e293b"); path.setAttribute("opacity", "0.05");
                element.appendChild(path); arrayStr.push(path);

                const text = document.createElementNS(svgNS, "text");
                text.setAttribute("x", 62 * Math.cos(svgRotations[i] * Math.PI / 180));
                text.setAttribute("y", 62 * Math.sin(svgRotations[i] * Math.PI / 180));
                text.setAttribute("text-anchor", "middle"); text.setAttribute("dominant-baseline", "middle");
                text.setAttribute("fill", "#64748b"); text.setAttribute("font-size", "11px"); text.setAttribute("font-weight", "bold");
                text.textContent = dir.name;
                element.appendChild(text);
            });
        }

        initCompass(document.getElementById('compass-food'), wedgesFood, "#3b82f6");
        initCompass(document.getElementById('compass-danger'), wedgesDanger, "#ef4444");

        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.addEventListener('click', () => {
                    if (snake.some(s => s.x === x && s.y === y)) return;
                    foodPos = {x, y}; updateGridVisuals(); calculateFood();
                });
                gridEl.appendChild(cell);
            }
        }

        function generateScene() {
            // Scegli direzione di sguardo a caso
            f_vec = absoluteDirs[Math.floor(Math.random() * 4)];
            // Calcola il vettore Destra matematicamente: se fwd=(0,-1), right=(1,0)
            r_vec = { dx: -f_vec.dy, dy: f_vec.dx }; 

            snake = [{ x: center, y: center }]; // Testa
            
            // Il primo blocco del corpo nasce SEMPRE alle spalle (Sud relativo)
            let neckX = center - f_vec.dx;
            let neckY = center - f_vec.dy; 
            snake.push({ x: neckX, y: neckY });

            let curr = snake[1];
            const length = 4 + Math.floor(Math.random() * 6);

            for (let i = 0; i < length; i++) {
                const neighbors = [
                    {x: curr.x + 1, y: curr.y}, {x: curr.x - 1, y: curr.y},
                    {x: curr.x, y: curr.y + 1}, {x: curr.x, y: curr.y - 1}
                ].filter(n => n.x >= 0 && n.x < gridSize && n.y >= 0 && n.y < gridSize && !snake.some(s => s.x === n.x && s.y === n.y));
                if (neighbors.length === 0) break;
                curr = neighbors[Math.floor(Math.random() * neighbors.length)];
                snake.push(curr);
            }

            if (foodPos && snake.some(s => s.x === foodPos.x && s.y === foodPos.y)) foodPos = null;

            updateGridVisuals();
            calculateDanger();
            calculateFood();
        }

        function updateGridVisuals() {
            Array.from(gridEl.children).forEach(c => c.className = 'cell');

            // Raycast visivi sulla griglia assoluta
            localDirs.forEach(dir => {
                // Converte le coordinate locali in direzioni assolute sulla griglia HTML
                let w_dx = dir.lx * r_vec.dx + dir.ly * f_vec.dx;
                let w_dy = dir.lx * r_vec.dy + dir.ly * f_vec.dy;
                let cx = center, cy = center;
                while(true) {
                    cx += w_dx; cy += w_dy;
                    if (cx < 0 || cx >= gridSize || cy < 0 || cy >= gridSize) break;
                    if (snake.some(s => s.x === cx && s.y === cy)) break;
                    gridEl.children[cy * gridSize + cx].classList.add('ray');
                }
            });

            for (let i = 1; i < snake.length; i++) gridEl.children[snake[i].y * gridSize + snake[i].x].classList.add('body');
            
            let headCell = gridEl.children[center * gridSize + center];
            headCell.classList.add('head');
            headCell.classList.add(`face-${f_vec.id}`);

            if (foodPos) gridEl.children[foodPos.y * gridSize + foodPos.x].classList.add('food');
        }

        // --- CALCOLI RELATIVI (NORD = AVANTI) ---
        function calculateFood() {
            const stats = document.getElementById('stats-food');
            if (!foodPos) {
                stats.innerHTML = '<div style="text-align:center; color:#64748b; font-size:12px;">Nessun obiettivo</div>';
                document.getElementById('distance-food').textContent = `Distanza: -- passi`;
                wedgesFood.forEach(w => { w.setAttribute("opacity", "0.05"); w.setAttribute("fill", "#3b82f6"); });
                return;
            }

            // Vettore assoluto (testa -> cibo)
            const adx = foodPos.x - center;
            const ady = foodPos.y - center;
            let dist = Math.sqrt(adx*adx + ady*ady);

            // PROIEZIONE: Convertiamo le coordinate assolute in coordinate locali (Nord = Avanti)
            const local_x = adx * r_vec.dx + ady * r_vec.dy;
            const local_y = adx * f_vec.dx + ady * f_vec.dy;

            let percentages = new Array(8).fill(0);
            if (local_x !== 0 || local_y !== 0) {
                // local_y cresce in avanti, local_x cresce a destra
                let theta = Math.atan2(local_y, local_x) * 180 / Math.PI;
                if (theta < 0) theta += 360;
                let exactIndex = theta / 45;
                let lowerIndex = Math.floor(exactIndex);
                percentages[lowerIndex % 8] = 1 - (exactIndex - lowerIndex);
                percentages[(lowerIndex + 1) % 8] = exactIndex - lowerIndex;
            }

            stats.innerHTML = '';
            document.getElementById('distance-food').textContent = `Distanza: ${dist.toFixed(2)} passi`;
            percentages.forEach((val, i) => {
                wedgesFood[i].setAttribute("opacity", val > 0 ? Math.max(0.3, val) : 0.05);
                wedgesFood[i].setAttribute("fill", `rgba(59, 130, 246, ${0.4 + val*0.6})`);
                if (val > 0.001) {
                    const r = document.createElement('div'); r.className = 'stat-row'; r.style.color = '#60a5fa';
                    r.innerHTML = `<span style="width:25px">${localDirs[i].name}</span><div class="stat-bar-container"><div class="stat-bar" style="background:#3b82f6; width:${(val*100).toFixed(1)}%"></div></div><span style="width:45px; text-align:right">${(val*100).toFixed(1)}%</span>`;
                    stats.appendChild(r);
                }
            });
        }

        function calculateDanger() {
            const stats = document.getElementById('stats-danger');
            stats.innerHTML = '';

            localDirs.forEach((dir, i) => {
                // Riconvertiamo la direzione locale (Es. Nord/Avanti) in step per la griglia HTML
                let w_dx = dir.lx * r_vec.dx + dir.ly * f_vec.dx;
                let w_dy = dir.lx * r_vec.dy + dir.ly * f_vec.dy;
                
                let cx = center, cy = center; let distance = 0;
                while (true) {
                    cx += w_dx; cy += w_dy;
                    let d = Math.sqrt(Math.pow(cx - center, 2) + Math.pow(cy - center, 2));
                    if (cx < 0 || cx >= gridSize || cy < 0 || cy >= gridSize || snake.some(s => s.x === cx && s.y === cy)) {
                        distance = d; break;
                    }
                }

                let dangerVal = 1 / distance;
                wedgesDanger[i].setAttribute("opacity", dangerVal > 0.1 ? Math.max(0.2, dangerVal) : 0.05);
                wedgesDanger[i].setAttribute("fill", `rgba(239, 68, 68, ${0.3 + dangerVal * 0.7})`);

                const r = document.createElement('div'); r.className = 'stat-row';
                r.style.color = dangerVal === 1 ? '#ef4444' : '#94a3b8';
                r.innerHTML = `<span style="width:25px">${dir.name}</span><div class="stat-bar-container"><div class="stat-bar" style="background:#ef4444; width:${(dangerVal*100).toFixed(1)}%"></div></div><span style="width:45px; text-align:right">${(dangerVal*100).toFixed(1)}%</span>`;
                stats.appendChild(r);
            });
        }

        generateScene();
    </script>
</body>
</html>
